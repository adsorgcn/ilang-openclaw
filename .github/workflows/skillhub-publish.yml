name: 发布到腾讯 SkillHub

on:
  push:
    branches: [main]
    paths:
      - 'skills/*/SKILL.md'
      - 'skills/*/prompt.md'

jobs:
  publish-skills:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: 安装 SkillHub CLI
        run: |
          curl -fsSL https://skillhub.cn/install/install.sh | bash -s -- --cli-only
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: 登录 SkillHub
        run: skillhub auth login --token "${{ secrets.SKILLHUB_TOKEN }}" --host https://api.skillhub.cn

      - name: 检测变更并发布
        run: |
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD)
          PUBLISHED=""

          for dir in skills/*/; do
            dir_name=$(basename "$dir")
            [ ! -f "skills/$dir_name/SKILL.md" ] && continue

            if echo "$CHANGED_FILES" | grep -q "^skills/$dir_name/"; then
              echo ">>> 检测到 skills/$dir_name 有变更，发布中..."

              skillhub publish "skills/$dir_name" \
                --changelog "Auto-published from GitHub commit ${{ github.sha }}" \
                || echo ">>> 发布 $dir_name 失败（版本可能已存在或slug冲突）"

              PUBLISHED="$PUBLISHED $dir_name"
            fi
          done

          if [ -z "$PUBLISHED" ]; then
            echo ">>> 未检测到技能变更"
          else
            echo ">>> 已发布到 SkillHub:$PUBLISHED"
          fi
