name: 发布到腾讯 SkillHub

on:
  push:
    branches: [main]
    paths:
      - 'skills/**'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish-skills:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: 安装 SkillHub CLI
        run: |
          curl -fsSL https://skillhub.cn/install/install.sh | bash -s -- --cli-only
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: 登录 SkillHub
        run: |
          skillhub auth login --token "${{ secrets.SKILLHUB_TOKEN }}" --host https://api.skillhub.cn
          skillhub auth whoami

      - name: 检测变更并发布
        run: |
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD)
          PUBLISHED=""

          for dir in skills/*/; do
            dir_name=$(basename "$dir")
            [ ! -f "skills/$dir_name/SKILL.md" ] && continue

            if echo "$CHANGED_FILES" | grep -q "^skills/$dir_name/"; then
              echo ">>> 检测到 skills/$dir_name 有变更，发布中..."
              cd "skills/$dir_name"
              skillhub publish . --changelog "GitHub auto-publish ${{ github.sha }}" 2>&1 || true
              cd ../..
              PUBLISHED="$PUBLISHED $dir_name"
              sleep 30
            fi
          done

          if [ -z "$PUBLISHED" ]; then
            echo ">>> 未检测到技能变更"
          else
            echo ">>> 已发布到 SkillHub:$PUBLISHED"
          fi
