name: 发布到腾讯 SkillHub

on:
  push:
    branches: [main]
    paths:
      - 'skills/**'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish-skills:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: 安装 SkillHub CLI
        run: |
          curl -fsSL https://skillhub.cn/install/install.sh | bash -s -- --cli-only
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: 登录 SkillHub
        run: skillhub auth login --token "${{ secrets.SKILLHUB_TOKEN }}" --host https://api.skillhub.cn

      - name: 发布全部技能
        run: |
          PUBLISHED=""
          FAILED=""

          for dir in skills/*/; do
            dir_name=$(basename "$dir")
            [ ! -f "skills/$dir_name/SKILL.md" ] && continue

            echo ">>> 发布 skills/$dir_name ..."

            skillhub publish "skills/$dir_name" \
              --changelog "Auto-published from GitHub commit ${{ github.sha }}" \
              && PUBLISHED="$PUBLISHED $dir_name" \
              || FAILED="$FAILED $dir_name"
          done

          echo ""
          echo "========================================="
          [ -n "$PUBLISHED" ] && echo "✅ 成功:$PUBLISHED"
          [ -n "$FAILED" ] && echo "⚠️ 失败（版本已存在或其他原因）:$FAILED"
          [ -z "$PUBLISHED" ] && [ -z "$FAILED" ] && echo ">>> 未找到技能"
          echo "========================================="
