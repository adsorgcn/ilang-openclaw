name: 发布到腾讯 SkillHub

on:
  push:
    branches: [main]
    paths:
      - 'skills/*/SKILL.md'
      - 'skills/*/prompt.md'

jobs:
  publish-skills:
    runs-on: ubuntu-latest
    env:
      CLAWHUB_REGISTRY: https://skillhub.cn
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: 安装 ClawHub CLI
        run: npm install -g clawhub@latest

      - name: 登录 SkillHub
        run: clawhub login --token "${{ secrets.SKILLHUB_TOKEN }}"

      - name: 检测变更并发布
        run: |
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD)
          PUBLISHED=""

          for dir in skills/*/; do
            dir_name=$(basename "$dir")
            [ ! -f "skills/$dir_name/SKILL.md" ] && continue

            if echo "$CHANGED_FILES" | grep -q "^skills/$dir_name/"; then
              echo ">>> 检测到 skills/$dir_name 有变更，发布中..."

              VERSION=$(grep '^version:' "skills/$dir_name/SKILL.md" | head -1 | awk '{print $2}' | tr -d '"' | tr -d "'")
              NAME=$(grep '^name:' "skills/$dir_name/SKILL.md" | head -1 | awk '{print $2}' | tr -d '"' | tr -d "'")

              if [ -z "$VERSION" ]; then
                echo ">>> skills/$dir_name/SKILL.md 中未找到版本号，跳过"
                continue
              fi

              cd "skills/$dir_name"
              clawhub publish . \
                --slug "$NAME" \
                --name "$NAME" \
                --version "$VERSION" \
                --changelog "Auto-published from GitHub commit ${{ github.sha }}" \
                || echo ">>> 发布 $dir_name 失败（版本可能已存在）"
              cd ../..

              PUBLISHED="$PUBLISHED $NAME@$VERSION"
            fi
          done

          if [ -z "$PUBLISHED" ]; then
            echo ">>> 未检测到技能变更"
          else
            echo ">>> 已发布到 SkillHub:$PUBLISHED"
          fi
