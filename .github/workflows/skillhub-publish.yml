name: 发布到腾讯 SkillHub

on:
  push:
    branches: [main]
    paths:
      - 'skills/**'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish-skills:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 SkillHub CLI
        run: |
          curl -fsSL https://skillhub.cn/install/install.sh | bash -s -- --cli-only
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: 登录 SkillHub
        run: |
          skillhub auth login --token "${{ secrets.SKILLHUB_TOKEN }}" --host https://api.skillhub.cn
          skillhub auth whoami

      - name: 逐个发布技能
        run: |
          SKILLS="Niche-Awesome DeAI WeChat-Awesome freemoney lazarus everything-is-ok ilang-compress less-token no-prompt"
          
          for skill in $SKILLS; do
            echo ""
            echo "========================================="
            echo ">>> 正在发布: $skill"
            echo "========================================="
            
            if [ ! -f "skills/$skill/SKILL.md" ]; then
              echo ">>> 跳过: SKILL.md不存在"
              continue
            fi
            
            cd "skills/$skill"
            skillhub publish . --changelog "GitHub auto-publish ${{ github.sha }}" 2>&1 || true
            cd ../..
            
            echo ">>> 等待10秒..."
            sleep 10
          done
          
          echo ""
          echo "========================================="
          echo ">>> 全部完成"
          echo "========================================="
